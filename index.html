<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS M45 - Web Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 100%);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
        }

        .header h1 {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            font-size: 1.8rem;
            letter-spacing: 2px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ff4444;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.5rem;
            border-radius: 15px;
            line-height: 1.5;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            background: linear-gradient(135deg, #0066cc, #004499);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }

        .jarvis-message {
            background: linear-gradient(135deg, #1a1a2e, #2d2d44);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
            border-left: 3px solid #00d4ff;
        }

        .input-area {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid #00d4ff;
        }

        #commandInput {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #00d4ff;
            border-radius: 10px;
            padding: 1rem;
            color: #e0e0e0;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        #commandInput:focus {
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        button {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 10px;
            padding: 1rem 2rem;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .quick-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .quick-action-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 20px;
        }

        .quick-action-btn:hover {
            background: rgba(0, 212, 255, 0.2);
        }

        .typing-indicator {
            display: none;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem;
            color: #00d4ff;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dots {
            display: flex;
            gap: 0.3rem;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            background: #00d4ff;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.3);
        }

        ::-webkit-scrollbar-thumb {
            background: #00d4ff;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0099cc;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 JARVIS M45</h1>
        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="chat-container">
        <div class="messages" id="messages">
            <div class="message jarvis-message">
                Welcome to JARVIS M45 Web Interface! I'm ready to assist you. What would you like me to do?
            </div>
        </div>

        <div class="typing-indicator" id="typingIndicator">
            <span>JARVIS is thinking</span>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="commandInput" placeholder="Type your command..." autocomplete="off">
            <button onclick="sendCommand()">Send</button>
            <button onclick="startVoiceInput()" title="Voice Input">🎤</button>
        </div>

        <div class="quick-actions">
            <button class="quick-action-btn" onclick="quickCommand('What can you do?')">Capabilities</button>
            <button class="quick-action-btn" onclick="quickCommand('Run system diagnostics')">Diagnostics</button>
            <button class="quick-action-btn" onclick="quickCommand('Show me my files')">Files</button>
            <button class="quick-action-btn" onclick="quickCommand('Create a new Python script')">New Script</button>
            <button class="quick-action-btn" onclick="quickCommand('What\'s the weather?')">Weather</button>
        </div>
    </div>

    <script>
        let ws = null;
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const messagesDiv = document.getElementById('messages');
        const commandInput = document.getElementById('commandInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // Connect to WebSocket server
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:8765');

            ws.onopen = function() {
                statusDot.classList.add('connected');
                statusText.textContent = 'Online';
                addMessage('Connected to JARVIS M45', 'jarvis');
            };

            ws.onclose = function() {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected';
                setTimeout(connectWebSocket, 3000); // Auto-reconnect
            };

            ws.onerror = function(error) {
                console.error('WebSocket error:', error);
                statusDot.classList.remove('connected');
                statusText.textContent = 'Error';
            };

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.type === 'response') {
                    hideTypingIndicator();
                    addMessage(data.content, 'jarvis');
                } else if (data.type === 'welcome') {
                    console.log('Welcome message received');
                }
            };
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function showTypingIndicator() {
            typingIndicator.classList.add('active');
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function hideTypingIndicator() {
            typingIndicator.classList.remove('active');
        }

        function sendCommand() {
            const command = commandInput.value.trim();
            if (!command || !ws || ws.readyState !== WebSocket.OPEN) return;

            addMessage(command, 'user');
            commandInput.value = '';
            showTypingIndicator();

            ws.send(JSON.stringify({
                type: 'command',
                content: command
            }));
        }

        function quickCommand(command) {
            commandInput.value = command;
            sendCommand();
        }

        function startVoiceInput() {
            if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                const recognition = new SpeechRecognition();
                
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.start();

                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    commandInput.value = transcript;
                    sendCommand();
                };

                recognition.onerror = function(event) {
                    addMessage('Voice recognition error: ' + event.error, 'jarvis');
                };
            } else {
                addMessage('Voice input is not supported in this browser. Try Chrome or Edge.', 'jarvis');
            }
        }

        // Allow Enter key to send
        commandInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendCommand();
            }
        });

        // Initialize connection
        connectWebSocket();
    </script>
</body>
</html>
