<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3F4F6"/>
    </radialGradient>

    <!-- Primary gradient -->
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)"/>

  <!-- Subtle orbital guide -->
  <circle cx="250" cy="250" r="160"
          stroke="#E5E7EB"
          stroke-width="2"
          fill="none"/>

  <!-- Controlled particle system -->
  <g>

    <!-- Primary nodes -->
    <circle cx="250" cy="90" r="6" fill="url(#primary)"/>
    <circle cx="390" cy="250" r="5" fill="url(#primary)"/>
    <circle cx="250" cy="410" r="6" fill="url(#primary)"/>
    <circle cx="110" cy="250" r="5" fill="url(#primary)"/>

    <!-- Secondary nodes (asymmetrical but balanced) -->
    <circle cx="340" cy="140" r="4" fill="url(#accent)"/>
    <circle cx="360" cy="330" r="4" fill="url(#accent)"/>
    <circle cx="160" cy="360" r="4" fill="url(#accent)"/>
    <circle cx="140" cy="150" r="4" fill="url(#accent)"/>

  </g>

  <!-- Center core -->
  <circle cx="250" cy="250" r="95" fill="#FFFFFF"/>

  <!-- Brand name -->
  <text x="250" y="255"
        text-anchor="middle"
        font-size="42"
        font-family="Inter, Poppins, sans-serif"
        font-weight="600"
        letter-spacing="6"
        fill="#111827">
    JARVIS
  </text>

  <!-- Sub-label -->
  <text x="250" y="290"
        text-anchor="middle"
        font-size="16"
        font-family="Inter, sans-serif"
        fill="#6B7280"
        letter-spacing="4">
    M45
  </text>

</svg>